services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: game-promo-hub-api:latest
    ports:
      - "8080:8080"
    volumes:
      - ./promo.db:/app/promo.db
      - ./assets:/app/assets
      - ./twitter_session.json:/app/twitter_session.json
      - "${CLAUDE_CONFIG_DIR:-${HOME}/.claude}:/root/.claude"
    env_file:
      - .env
    environment:
      - DISCORD_ENABLED=${DISCORD_ENABLED:-true}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: game-promo-hub-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://api:8080
    env_file:
      - ./frontend/.env.local
    depends_on:
      - api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      - api
      - frontend
    restart: unless-stopped
